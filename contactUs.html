<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contact Us - StartIT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background-color: #b7a9f0;
        }

        /* ===== Top Bar ===== */
        .top-bar {
            background-color: #5a2d82;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            position: relative;
        }

        .logo-btn {
            cursor: pointer;
            font-size: 28px;
            margin-right: 20px;
        }

        .top-title {
            flex-grow: 1;
            text-align: center;
            font-size: 22px;
        }

        /* ===== Sidebar Dropdown ===== */
        .sidebar {
            position: absolute;
            top: 70px;
            left: 0;
            width: 220px;
            background-color: #4b1f6f;
            display: none;
            flex-direction: column;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .sidebar a {
            padding: 18px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar a:hover {
            background-color: #6a3fa0;
        }

        /* ===== Main Content ===== */
		
        .main {
            padding: 60px 20px;
            text-align: center;
        }

        .headline {
            font-size: 36px;
            color: black;
            margin-bottom: 40px;
        }

        .headline span {
            color: #6b4b3e;
            font-weight: bold;
        }


        /* ===== Cards ===== */
		.form-container {
				background-color: #512b7c;
				width: 85%;
				margin: auto;
				padding: 30px;
				border-radius: 30px;
				box-shadow: 0 10px 25px rgba(0,0,0,0.3);
				color: white;
				margin-bottom: 50px;
			}

			.form-row {
				display: flex;
				gap: 20px;
				margin-bottom: 15px;
			}

			.form-group {
				flex: 1;
			}

			label {
				display: block;
				font-size: 15px;
				margin-bottom: 5px;
			}

			input {
				width: 100%;
				padding: 9px 12px;
				border-radius: 6px;
				border: none;
				outline: none;
			}
			
			.full {
				flex: 100%;
			}
			
			/* ===== Submit Button ===== */
			.button-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 5px;
			gap: 15px;
        }

        .btn-submit {
            background-color: #b7a9f0;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #3d1f85;
        }
        
    </style>
</head>

<body>

<!-- ===== Top Bar ===== -->
<div class="top-bar">
    <div class="logo-btn" onclick="toggleMenu()">☰</div>
    <div class="top-title">Contact Us</div>

    <div class="sidebar" id="sidebar">
        <a href="#">Update Profile</a>
        <a href="#">Job Vacancy</a>
        <a href="#">Application Status</a>
    </div>
</div>
</div>
<br>
<br>

<form class="form-container">

   <h2>Any Question?</h2>
    <p>Feel free to ask, We are always ready to assist you.</p>
	
	<br>
	<div class="form-row">
        <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email">
        </div>
	  </div>
	  
	  <div class="form-group">
            <label>Phone Number</label>
            <input type="phone number" placeholder="Phone Number">
        </div>
	  
	  <br>
	  <div class="form-row">
        <div class="form-group full">
            <label>Write a message</label>
            <input type="text">
        </div>
    </div>
	
	<button type="submit" class="submit-btn">Send</button>
	<br>
	<br>
	<p>No.18 Jalan 37/16, Seksyen 3, </p>
	<p>Bandar Baru Bangi,Selangor</p>
	  <p> 09-4238890</p>
	  <p> hr@startit.com</p>


<!-- ===== JavaScript ===== -->
<script>
    function toggleMenu() {
        const sidebar = document.getElementById("sidebar");
        sidebar.style.display = sidebar.style.display === "flex" ? "none" : "flex";
    }
</script>

</html>
